spring.application.name=smart-alarm-clock
server.port=8080

# H2 Database Configuration
spring.datasource.url=jdbc:h2:file:./data/alarms;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate ddl auto (update table schema automatically)
spring.jpa.hibernate.ddl-auto=update

# Enable H2 console (optional, for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
