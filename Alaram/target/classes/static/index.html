<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Alarm Clock</title>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=3">
    <link rel="manifest" href="manifest.json">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>

    <div class="app-container">
        <!-- Interactive Overlay To Allow Audio Autoplay -->
        <div id="init-overlay" class="init-overlay">
            <div class="glass-panel init-panel">
                <h2>Welcome to Smart Clock</h2>
                <p>Click below to enable features and start the clock.</p>
                <button id="start-btn" class="btn primary-btn">Start Clock</button>
            </div>
        </div>

        <!-- Math Puzzle Modal (Hidden by Default) -->
        <div id="puzzle-modal" class="modal hidden">
            <div class="glass-panel modal-content">
                <h2 class="alert-text"><i class="fa-solid fa-bell-slash"></i> Wake Up!</h2>
                <p>Solve the puzzle to dismiss the alarm.</p>
                <div class="puzzle-box">
                    <span id="puzzle-question">15 + 27 = ?</span>
                </div>
                <input type="number" id="puzzle-answer" placeholder="Your Answer">
                <div class="modal-actions" style="display: flex; gap: 10px; justify-content: center; margin-top: 15px;">
                    <button id="snooze-btn" class="btn" style="background: rgba(255,255,255,0.1); color: inherit;">Snooze (9m)</button>
                    <button id="submit-puzzle-btn" class="btn primary-btn">Dismiss Alarm</button>
                </div>
                <p id="puzzle-error" class="error-text hidden">Incorrect. Try again!</p>
            </div>
        </div>

        <header class="app-header">
            <div class="weather-widget">
                <i class="fa-solid fa-cloud-sun"></i>
                <span id="temperature">--°C</span>
                <span id="humidity">--%</span>
            </div>
            <div class="header-right" style="display: flex; align-items: center; gap: 20px;">
                <button id="theme-toggle" class="btn-icon" style="background:none; border:none; color:inherit; font-size: 1.2rem; cursor:pointer;" title="Toggle Theme">
                    <i class="fa-solid fa-moon" id="theme-icon"></i>
                </button>
                <div class="date-widget" id="current-date">
                    Loading...
                </div>
            </div>
        </header>

        <main>
            <!-- The Big Clock -->
            <div class="clock-display">
                <h1 id="time-display">00:00:00</h1>
                <span class="am-pm" id="am-pm-display">AM</span>
            </div>

            <!-- Dashboard Content -->
            <div class="dashboard grid">
                <!-- Add Alarm Form -->
                <section class="glass-panel add-alarm-section">
                    <h3><i class="fa-solid fa-plus"></i> New Alarm</h3>
                    <form id="alarm-form">
                        <div class="form-group">
                            <label>Time</label>
                            <input type="time" id="alarm-time" required>
                        </div>

                        <div class="form-group days-selector">
                            <label>Days</label>
                            <div class="days-container">
                                <label><input type="checkbox" value="MON"> M</label>
                                <label><input type="checkbox" value="TUE"> T</label>
                                <label><input type="checkbox" value="WED"> W</label>
                                <label><input type="checkbox" value="THU"> T</label>
                                <label><input type="checkbox" value="FRI"> F</label>
                                <label><input type="checkbox" value="SAT"> S</label>
                                <label><input type="checkbox" value="SUN"> S</label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Audio Mode</label>
                            <select id="alarm-audio">
                                <option value="buzzer">Digital Buzzer</option>
                                <option value="nature">Gentle Nature</option>
                                <option value="lofi">Lofi Chill</option>
                                <option value="classic">Classic Bell</option>
                                <option value="electronic">Upbeat Electronic</option>
                                <option value="custom">Custom File (.mp3/.wav)</option>
                            </select>
                        </div>

                        <div class="form-group hidden" id="custom-audio-group">
                            <label>Upload Audio File</label>
                            <input type="file" id="custom-audio-file" accept=".mp3, .wav">
                        </div>

                        <div class="form-group checkbox-group">
                            <label><input type="checkbox" id="alarm-puzzle"> Require Math Puzzle</label>
                        </div>

                        <button type="submit" class="btn primary-btn full-width">Save Alarm</button>
                    </form>
                </section>

                <!-- Alarms List -->
                <section class="glass-panel alarms-list-section">
                    <h3><i class="fa-solid fa-list"></i> Your Alarms</h3>
                    <div id="alarms-container" class="alarms-container">
                        <!-- Alarms will be dynamically rendered here -->
                        <div class="loading-text">Loading alarms...</div>
                    </div>
                </section>
            </div>
        </main>

        <!-- Audio elements -->
        <!-- For a real app, you'd use real sound files. We will use a reliable remote sound or synthesize it via WebAudioAPI if missing. -->
        <audio id="audio-buzzer" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" loop
            preload="auto"></audio>
        <audio id="audio-nature" src="https://actions.google.com/sounds/v1/water/waves_crashing_on_rock_beach.ogg" loop
            preload="auto"></audio>
        <audio id="audio-lofi" src="https://actions.google.com/sounds/v1/weather/rain_heavy_loud.ogg" loop
            preload="auto"></audio>
        <audio id="audio-classic" src="https://actions.google.com/sounds/v1/alarms/analog_watch_alarm.ogg" loop
            preload="auto"></audio>
        <audio id="audio-electronic" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" loop
            preload="auto"></audio>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
